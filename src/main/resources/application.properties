spring.application.name=audit-service
server.port=8087
server.servlet.context-path=/audit

# DATABASE
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5436/audit_database}
spring.datasource.username=${DATASOURCE_USERNAME:rota-facil}
spring.datasource.password=${DATASOURCE_PASSWORD:admin}

# JPA + HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.log-resolvers=true

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.client.fetch-registry=true

# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}


# RABBITMQ AUTH
rabbitmq.auth.exchange=${RABBITMQ_AUTH_EXCHANGE:auth.events}
# queues
rabbitmq.audit.user.creted.queue=${RABBITMQ_AUDIT_USER_CREATED_QUEUE:audit.user.creted.queue}
rabbitmq.audit.user.updated.queue=${RABBITMQ_AUDIT_USER_UPDATED_QUEUE:audit.user.updated.queue}
rabbitmq.audit.user.deleted.queue=${RABBITMQ_AUDIT_USER_DELETED_QUEUE:audit.user.deleted.queue}

rabbitmq.audit.prefecture.created.queue=${RABBIMQ_PREFECTURE_CREATED_QUEUE:audit.prefecture.created.queue}
rabbitmq.audit.prefecture.updated.queue=${RABBIMQ_PREFECTURE_UPDATED_QUEUE:audit.prefecture.updated.queue}
rabbitmq.audit.prefecture.deleted.queue=${RABBIMQ_PREFECTURE_DELETED_QUEUE:audit.prefecture.deleted.queue}

# routing keys
rabbitmq.user.created.routing.key=${RABBITMQ_USER_CREATED_ROUTING_KEY:user.created}
rabbitmq.user.updated.routing.key=${RABBITMQ_USER_UPDATED_ROUTING_KEY:user.updated}
rabbitmq.user.deleted.routing.key=${RABBITMQ_USER_DELETED_ROUTING_KEY:user.deleted}

rabbitmq.prefecture.created.routing.key=${RABBITMQ_PREFECTURE_CREATED_ROUTING_KEY:prefecture.created}
rabbitmq.prefecture.updated.routing.key=${RABBITMQ_PREFECTURE_UPDATED_ROUTING_KEY:prefecture.updated}
rabbitmq.prefecture.deleted.routing.key=${RABBITMQ_PREFECTURE_DELETED_ROUTING_KEY:prefecture.deleted}


# RABBITMQ FILE
rabbitmq.file.exchange=${RABBITMQ_FILE_EXCHANGE:file.events}

# queues
rabbitmq.audit.file.created.queue=${RABBITMQ_AUDIT_FILE_CREATED_QUEUE}
rabbitmq.audit.file.updated.queue=${RABBITMQ_AUDIT_FILE_UPDATED_QUEUE}
rabbitmq.audit.file.deleted.queue=${RABBITMQ_AUDIT_FILE_DELETED_QUEUE}

# routing keys
rabbitmq.file.created.routing.key=${RABBITMQ_FILE_CREATED_ROUTING_KEY:file.created}
rabbitmq.file.updated.routing.key=${RABBITMQ_FILE_UPDATED_ROUTING_KEY:file.updated}
rabbitmq.file.deleted.routing.key=${RABBITMQ_FILE_DELETED_ROUTING_KEY:file.deleted}



# RABBITMQ PLACES
rabbitmq.places.exchange=${RABBITMQ_PLACES_EXCHANGE:places.events}
# queues
rabbitmq.audit.institution.created.queue=${RABBITMQ_AUDIT_INSTITUTION_CREATED_QUEUE:audit.institution.created.queue}
rabbitmq.audit.institution.updated.queue=${RABBITMQ_AUDIT_INSTITUTION_CREATED_QUEUE:audit.institution.updated.queue}
rabbitmq.audit.institution.deleted.queue=${RABBITMQ_AUDIT_INSTITUTION_CREATED_QUEUE:audit.institution.deleted.queue}

rabbitmq.audit.boarding.created.queue=${RABBITMQ_AUDIT_BOARDING_CREATED_QUEUE:audit.boarding.created.queue}
rabbitmq.audit.boarding.updated.queue=${RABBITMQ_AUDIT_BOARDING_UPDATED_QUEUE:audit.boarding.updated.queue}
rabbitmq.audit.boarding.deleted.queue=${RABBITMQ_AUDIT_BOARDING_DELETED_QUEUE:audit.boarding.deleted.queue}

# routing keys
rabbitmq.institution.created.routing.key=${RABBITMQ_INSTITUTION_CREATED_ROUTING_KEY:institution.created}
rabbitmq.institution.updated.routing.key=${RABBITMQ_INSTITUTION_UPDATED_ROUTING_KEY:institution.updated}
rabbitmq.institution.deleted.routing.key=${RABBITMQ_INSTITUTION_DELETED_ROUTING_KEY:institution.deleted}

rabbitmq.boarding.created.routing.key=${RABBITMQ_BOARDING_CREATED_ROUTING_KEY:boarding.created}
rabbitmq.boarding.updated.routing.key=${RABBITMQ_BOARDING_UPDATED_ROUTING_KEY:boarding.updated}
rabbitmq.boarding.deleted.routing.key=${RABBITMQ_BOARDING_DELETED_ROUTING_KEY:boarding.deleted}



# RABBITMQ TRANSPORT
rabbitmq.transport.exchange=${RABBITMQ_TRANSPORT_EXCHANGE:transport.events}
# queues
rabbitmq.audit.route.created.queue=${RABBITMQ_AUDIT_ROUTE_CREATED_QUEUE:audit.route.created.queue}
rabbitmq.audit.route.updated.queue=${RABBITMQ_AUDIT_ROUTE_UPDATED_QUEUE:audit.route.updated.queue}
rabbitmq.audit.route.deleted.queue=${RABBITMQ_AUDIT_ROUTE_DELETED_QUEUE:audit.route.deleted.queue}

rabbitmq.audit.trip.running.queue=${RABBITMQ_AUDIT_TRIP_RUNNING_QUEUE:audit.trip.running.queue}
rabbitmq.audit.trip.cancelled.queue=${RABBITMQ_AUDIT_TRIP_CANCELLED_QUEUE:audit.trip.cancelled.queue}

# routing keys
rabbitmq.route.created.routing.key=${RABBITMQ_ROUTE_CREATED_ROUTING_KEY:route.created}
rabbitmq.route.updated.routing.key=${RABBITMQ_ROUTE_UPDATED_ROUTING_KEY:route.updated}
rabbitmq.route.deleted.routing.key=${RABBITMQ_ROUTE_DELETED_ROUTING_KEY:route.deleted}

rabbitmq.trip.running.routing.key=${RABBITMQ_TRIP_RUNNING_ROUTING_KEY:trip.running}
rabbitmq.trip.cancelled.routing.key=${RABBITMQ_TRIP_CANCELLED_ROUTING_KEY:trip.cancelled}
